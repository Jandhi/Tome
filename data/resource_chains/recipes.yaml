recipes:
  # --- Wood / Forest ---
  wood_to_planks:
    inputs:
      wood: 2
    outputs:
      planks: 4
    building: sawmill

  planks_to_furniture:
    inputs:
      planks: 2
    outputs:
      furniture: 1
    building: carpenter

  wood_to_charcoal:
    inputs:
      wood: 2
    outputs:
      charcoal: 2
    building: charcoal_burner

  # --- Food / Agriculture ---
  wheat_to_flour:
    inputs:
      wheat: 2
    outputs:
      flour: 2
    building: mill

  flour_to_bread:
    inputs:
      flour: 1
    outputs:
      bread: 2
    building: bakery

  # --- Metal / Mining ---
  iron_ore_charcoal_to_ingot:
    inputs:
      iron_ore: 2
      charcoal: 1
    outputs:
      iron_ingot: 2
    building: smelter

  iron_ingot_to_tools:
    inputs:
      iron_ingot: 1
      charcoal: 1
    outputs:
      tools: 1
    building: smithy

  # --- Gathering (raw resource production) ---
  gather_wood:
    inputs: {}
    outputs:
      wood: 2
    building: woodcutter_hut

  gather_wheat:
    inputs: {}
    outputs:
      wheat: 2
    building: farm

  gather_iron_ore:
    inputs: {}
    outputs:
      iron_ore: 2
    building: iron_mine