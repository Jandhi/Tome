recipes:
  # --- Wood / Forest ---

  sugar_cane_to_paper:
    inputs:
      sugar_cane: 2
    outputs:
      paper: 3
    building: paper_mill

  paper_leather_to_books:
    inputs:
      paper: 1
      leather: 1
    outputs:
      books: 1
    building: scriptorium

  # --- Food / Agriculture ---

  sugar_cane_to_sugar:
    inputs:
      sugar_cane: 1
    outputs:
      sugar: 1
    building: mill

  sugar_cocoa_to_chocolate:
    inputs:
      sugar: 1
      cocoa_beans: 1
    outputs:
      chocolate: 2
    building: confectionery

  flour_wheat_to_ale: # does this make sense?
    inputs:
      flour: 1
      wheat: 1
    outputs:
      ale: 2
    building: brewery

  # --- Honey / Bees ---
  honey_wheat_to_mead:
    inputs:
      honey: 2
      wheat: 1
    outputs:
      mead: 2
    building: brewery

  honey_to_wax:
    inputs:
      honey: 2
    outputs:
      wax: 2
    building: apiary # do we want to have the wax be intermediate or have honey and beeswax be produced by the apiary?

  wax_to_candles:
    inputs:
      wax: 2
    outputs:
      candles: 4
    building: chandlery

  # --- Fiber / Textile ---
  wool_to_cloth:
    inputs:
      wool: 2
    outputs:
      cloth: 1
    building: loom

  cloth_to_clothing:
