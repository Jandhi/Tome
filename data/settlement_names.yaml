# Settlement-name vocabulary for generator/naming.rs (generate_settlement_name).
#
# The name is built from the FEATURES of the place — the most iconic building, a
# civic landmark (market, cross, …), the land shape, and the biome — so it reads
# as earned. Detection is CULTURE-NEUTRAL: each feature maps to an abstract
# *concept* (water, hill, market, …). Each culture then translates the concept
# into its OWN words and morphology, so a river town is "Brookford" (medieval),
# "Kawamura" (japanese), or "Bir Wadi" (desert) — never an English stem glued to
# a Japanese suffix.
#
# Composition per culture: a lead word is drawn from a weighted theme, then the
# name is either `stem + suffix` ("Mill"+"ford" -> "Millford", "Yama"+"mura" ->
# "Yamamura") or two words ("Bir Wadi"). Seeded by the town seed.

# Default chance (%) of the two-word form; a culture may override it.
two_word_pct: 35

# Relative weight of each theme when picking the lead word. Building and civic
# tie (a market is as defining as a mill); both beat the terrain, which beats the
# plain biome flavour.
weights:
  building: 5
  civic: 5
  landform: 3
  color: 3
  biome: 2

# Land-shape thresholds (blocks of ground relief across the footprint; share of
# footprint-edge cells touching water).
hilly_relief: 12
flat_relief: 3
water_share: 0.10

# ── Feature -> concept maps (shared across cultures) ──────────────────────────

# Urban structure type -> concept. The most common mapped type wins.
buildings:
  mill: mill
  smithy: smith
  bakery: baker
  carpenter: carpenter
  tannery: tanner
  weaver: weaver
  brewery: brewer
  butcher: butcher
  sawmill: sawyer
  chandlery: chandler
  scriptorium: scribe
  farm: field
  ranch: stock
  mine: delve

# Open-space landmark (plaza/park `.key()`) -> concept. Only strong, distinctive
# features are listed; weak ones (stage, hedge, cactus, wooded, lawn, flower) are
# omitted on purpose so they contribute no theme.
civic:
  market: market
  well: well
  monument: cross
  cemetery: grave
  fountain: spring
  pond: pool
  zen: garden

# Landform kind -> concept.
landforms:
  hilly: hill
  flat: flat
  water: water

# Biome-name substring -> concept. First matching rule wins; empty `contains` is
# the fallback. A culture missing a biome concept falls back to its `green`.
biomes:
  - contains: [badlands]
    concept: mesa
  - contains: [cherry]
    concept: blossom
  - contains: [mushroom]
    concept: spore
  - contains: [mangrove, swamp]
    concept: marsh
  - contains: [jungle]
    concept: vine
  - contains: [desert]
    concept: sand
  - contains: [savanna]
    concept: savanna
  - contains: [snow, frozen, ice]
    concept: frost
  - contains: [taiga]
    concept: pine
  - contains: [birch]
    concept: birch
  - contains: [forest]
    concept: wood
  - contains: [peak, hill, slope, windswept, mountain]
    concept: peak
  - contains: [beach, shore, ocean, river, coast]
    concept: shore
  - contains: [meadow, plains, sunflower]
    concept: meadow
  - contains: []
    concept: green

# ── Per-culture vocabulary + morphology ───────────────────────────────────────
# `suffixes` attach directly (lower-case) for the stem+suffix form; `fillers` are
# capitalised second words for the two-word form; `concepts` translate each
# concept into that culture's words. A concept a culture doesn't define simply
# contributes no theme (except `biome`, which falls back to `green`). `medieval`
# is the fallback culture.
cultures:
  medieval:
    suffixes: [bury, ford, ton, holm, wick, dale, barrow, mere, stead, field, ham, worth]
    fillers: [Hollow, Cross, Watch, Keep, Reach, End]
    # Colour modifiers — always lead ("Blackmere", "Red Ridge"). Future: bias
    # this pool toward the build palette's dominant material colour.
    colors: [Black, White, Red, Green, Grey, Gold, Silver]
    concepts:
      mill: [Mill]
      smith: [Smith]
      baker: [Baker]
      carpenter: [Carpenter]
      tanner: [Tanner]
      weaver: [Weaver]
      brewer: [Brewer]
      butcher: [Shamble]
      sawyer: [Sawyer]
      chandler: [Chandler]
      scribe: [Scribe]
      field: [Field]
      stock: [Stock]
      delve: [Delve]
      market: [Market, Chipping]
      well: [Well, Wells]
      cross: [Cross, Standing]
      grave: [Barrow, Hallow]
      spring: [Spring]
      pool: [Mere, Pool]
      garden: [Garden, Bower]
      hill: [Hill, Ridge, Crag]
      flat: [Field, Plain, Green]
      water: [Ford, Mere, Brook]
      mesa: [Mesa, Clay]
      blossom: [Blossom, Petal]
      spore: [Spore, Cap]
      marsh: [Marsh, Bog, Reed]
      vine: [Vine, Fern]
      sand: [Sand, Dust]
      savanna: [Acacia, Gold]
      frost: [Frost, Rime]
      pine: [Pine, Fir]
      birch: [Birch, Hazel]
      wood: [Oak, Elm, Thorn]
      peak: [Crag, Ridge, Stone]
      shore: [Tide, Cove, Salt]
      meadow: [Meadow, Clover, Lark]
      green: [Green, Long, Stone, Brook]
  japanese:
    two_word_pct: 15
    suffixes: [mura, machi, dani, gawa, hara, saki, sato]
    fillers: [Sato, Mura, Hama]
    colors: [Aka, Shiro, Kuro, Ao, Midori, Kin, Murasaki]
    concepts:
      smith: [Kaji]
      field: [Ta]
      market: [Ichi, Ichiba]
      well: [Ido]
      cross: [Tsuji]
      grave: [Tera]
      spring: [Izumi]
      pool: [Ike]
      garden: [Niwa, Sono]
      hill: [Yama, Oka, Take]
      flat: [Hara, No]
      water: [Kawa, Taki, Mizu]
      blossom: [Sakura]
      marsh: [Numa]
      sand: [Suna]
      frost: [Yuki, Shimo]
      pine: [Matsu]
      wood: [Mori, Hayashi]
      peak: [Take, Mine]
      shore: [Hama, Umi]
      meadow: [No, Hara]
      green: [Sato, Midori, Aoki]
  desert:
    # Arabic-style: definite article + construct (iḍāfa), no compound suffixes.
    # ~40% "Al-Wadi" / "Ar-Raml" (sun-letter assimilated), ~45% "Bir al-Raml"
    # construct, ~15% bare "Bir Zeit". Leads are geographic feature words.
    article:
      prefix_pct: 40
      construct_pct: 45
    fillers: [Dar, Bab, Qasr]
    # Arabic colour forms used in real toponyms (Al-Hamra, Az-Zarqa, Al-Bayda);
    # take the article + sun-letter assimilation like any other lead.
    colors: [Bayda, Sawda, Hamra, Khadra, Zarqa, Safra]
    concepts:
      smith: [Haddad]
      market: [Souk]
      well: [Bir]
      cross: [Qasr]
      grave: [Qubba]
      spring: [Ain]
      pool: [Birka]
      garden: [Bustan]
      hill: [Jebel, Tell]
      flat: [Sahel, Hamada]
      water: [Wadi, Ain]
      sand: [Raml, Erg, Sahra]
      mesa: [Hamada]
      wood: [Nakhl]
      peak: [Jebel, Ras]
      shore: [Marsa]
      meadow: [Bustan]
      green: [Bustan, Dar, Wadi]
