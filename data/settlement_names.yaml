# Settlement-name vocabulary for generator/naming.rs (generate_settlement_name).
#
# The name is built from the FEATURES of the place — the most iconic building, a
# civic landmark (market, cross, …), the land shape, and the biome — so it reads
# as earned. Detection is CULTURE-NEUTRAL: each feature maps to an abstract
# *concept* (water, hill, market, …). Each culture then translates the concept
# into its OWN words and morphology, so a river town is "Brookford" (medieval),
# "Kawamura" (japanese), or "Bir Wadi" (desert) — never an English stem glued to
# a Japanese suffix.
#
# Composition per culture: a lead word is drawn from a weighted theme, then the
# name is either `stem + suffix` ("Mill"+"ford" -> "Millford", "Yama"+"mura" ->
# "Yamamura") or two words ("Bir Wadi"). Seeded by the town seed.

# Default chance (%) of the two-word form; a culture may override it.
two_word_pct: 35

# Relative weight of each theme when picking the lead word. Building and civic
# tie (a market is as defining as a mill); both beat the terrain, which beats the
# plain biome flavour.
weights:
  building: 5
  civic: 5
  landform: 3
  color: 3
  biome: 2

# Land-shape thresholds (blocks of ground relief across the footprint; share of
# footprint-edge cells touching water).
hilly_relief: 12
flat_relief: 3
water_share: 0.10

# ── Feature -> concept maps (shared across cultures) ──────────────────────────

# Urban structure type -> concept. The most common mapped type wins.
buildings:
  mill: mill
  smithy: smith
  bakery: baker
  carpenter: carpenter
  tannery: tanner
  weaver: weaver
  brewery: brewer
  butcher: butcher
  sawmill: sawyer
  chandlery: chandler
  scriptorium: scribe
  farm: field
  ranch: stock
  mine: delve

# Open-space landmark (plaza/park `.key()`) -> concept. Only strong, distinctive
# features are listed; weak ones (stage, hedge, cactus, wooded, lawn, flower) are
# omitted on purpose so they contribute no theme.
civic:
  market: market
  well: well
  monument: cross
  cemetery: grave
  fountain: spring
  pond: pool
  zen: garden

# Landform kind -> concept.
landforms:
  hilly: hill
  flat: flat
  water: water

# Biome-name substring -> concept. First matching rule wins; empty `contains` is
# the fallback. A culture missing a biome concept falls back to its `green`.
biomes:
  - contains: [badlands]
    concept: mesa
  - contains: [cherry]
    concept: blossom
  - contains: [mushroom]
    concept: spore
  - contains: [mangrove, swamp]
    concept: marsh
  - contains: [jungle]
    concept: vine
  - contains: [desert]
    concept: sand
  - contains: [savanna]
    concept: savanna
  - contains: [snow, frozen, ice]
    concept: frost
  - contains: [taiga]
    concept: pine
  - contains: [birch]
    concept: birch
  - contains: [forest]
    concept: wood
  - contains: [peak, hill, slope, windswept, mountain]
    concept: peak
  - contains: [beach, shore, ocean, river, coast]
    concept: shore
  - contains: [meadow, plains, sunflower]
    concept: meadow
  - contains: []
    concept: green

# ── Per-culture vocabulary + morphology ───────────────────────────────────────
# `suffixes` attach directly (lower-case) for the stem+suffix form; `fillers` are
# capitalised second words for the two-word form; `concepts` translate each
# concept into that culture's words. A concept a culture doesn't define simply
# contributes no theme (except `biome`, which falls back to `green`). `medieval`
# is the fallback culture.
#
# `glosses` maps every name word (and suffix) to its plain-English meaning. The
# namer emits an English translation of the composed name as the welcome
# SUBTITLE — "Bir al-Raml" → "Well of the Sand", "Kawamura" → "River Village".
# Every concept word, filler, colour word, and suffix MUST appear here (enforced
# by `every_name_word_has_a_gloss`). Medieval names are readable Old English
# (Anglo-Saxon) forms — "Myln" (mill), "Ac" (oak), "Stan" (stone) — so the gloss
# is the modern-English reading: "Mylnham" → "Mill Homestead".
cultures:
  medieval:
    # Old-English suffixes: burh (fort), ford, tun (town), holm (isle), wic
    # (farm), dæl (dale), beorg (barrow), mere (pool), stede (stead), feld
    # (field), ham (homestead), worð (croft).
    suffixes: [bury, ford, ton, holm, wick, dale, barrow, mere, stead, feld, ham, worth]
    fillers: [Holh, Weard, Ende, Brycg, Cot]
    # Colour words keyed by dye id → Old-English word; always lead ("Blacmere",
    # "Reade Dun"). The namer renders the town's actual scheme colours, so these
    # keys must cover Medieval's `Culture::color_pool`.
    colors:
      red: Reade
      blue: Blue
      green: Grene
      yellow: Gold
      white: Hwit
      black: Blac
      brown: Brun
    concepts:
      mill: [Myln]
      smith: [Smith]
      baker: [Becer]
      carpenter: [Wright]
      tanner: [Tanner]
      weaver: [Webb]
      brewer: [Breow]
      butcher: [Shamble]
      sawyer: [Sawyer]
      chandler: [Candel]
      scribe: [Writere]
      field: [Acer]
      stock: [Stoc]
      delve: [Delf]
      market: [Ceap, Chipping]
      well: [Well, Wielle]
      cross: [Rod, Cross]
      grave: [Barrow, Hallow]
      spring: [Spring, Funta]
      pool: [Mere, Pool]
      garden: [Orceard, Wyrt]
      hill: [Dun, Hyll, Crag]
      flat: [Feld, Grene, Plain]
      water: [Broc, Mere, Ea]
      mesa: [Clay, Stan]
      blossom: [Blostm, Bloom]
      spore: [Spore, Cap]
      marsh: [Mersc, Fenn, Hreod]
      vine: [Fearn, Vine]
      sand: [Sand, Dust]
      savanna: [Gold, Acacia]
      frost: [Forst, Rime]
      pine: [Pin, Fir]
      birch: [Birce, Hasel]
      wood: [Ac, Elm, Holt]
      peak: [Crag, Beorg, Stan]
      shore: [Tid, Cove, Sealt]
      meadow: [Maedwe, Lea, Clofa]
      green: [Grene, Lang, Stan, Broc]
    # word/suffix → modern-English meaning (the subtitle).
    glosses:
      # suffixes
      bury: Fort
      ford: Ford
      ton: Town
      holm: Isle
      wick: Farm
      dale: Dale
      barrow: Barrow
      mere: Pool
      stead: Farmstead
      feld: Field
      ham: Homestead
      worth: Croft
      # colours
      Reade: Red
      Blue: Blue
      Grene: Green
      Gold: Gold
