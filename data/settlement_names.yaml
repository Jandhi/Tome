  japanese:
    two_word_pct: 15
    suffixes: [mura, machi, dani, gawa, hara, saki, sato]
    fillers: [Sato, Mura, Hama]
    colors:
      red: Aka
      blue: Ao
      white: Shiro
      black: Kuro
      purple: Murasaki
      yellow: Kin
      green: Midori
    concepts:
      smith: [Kaji]
      field: [Ta]
      market: [Ichi, Ichiba]
      well: [Ido]
      cross: [Tsuji]
      grave: [Tera]
      spring: [Izumi]
      pool: [Ike]
