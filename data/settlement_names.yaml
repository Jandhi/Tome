      Ende: End
      Brycg: Bridge
      Cot: Cottage
      # concept words
      Myln: Mill
      Smith: Smith
      Becer: Baker
      Wright: Carpenter
      Tanner: Tanner
      Webb: Weaver
      Breow: Brewer
