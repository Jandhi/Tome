# Flat-roof themes (desert). decorate_rooftops picks ONE of these per building
# so neighbouring roofs read as different spaces. These aren't real rooms — the
# parapet acts as the wall and there's no ceiling. Keep fill thresholds modest
# (working roofs a touch denser) so decks stay legible from the air.

# Living terrace — a shaded spot to relax.
roof_lounge:
  fill_threshold: 0.3
  required: [roof_shade]
  optional:
    - roof_bedroll
    - roof_hammock
    - carpet
    - carpet
    - roof_rug_runner
    - bench
    - chair
    - table
    - roof_lamp
    - roof_palm
    - vase
    - potted_plant
    - roof_laundry

# Roof garden — greenery and water.
roof_garden:
  fill_threshold: 0.33
  required: [roof_shade]
  optional:
    - roof_planter
    - roof_palm
    - roof_cactus_row
    - potted_plant
    - potted_plant
    - roof_water_trough
    - vase
    - carpet
    - roof_lamp
    - bench
    - roof_jars

# Open-air kitchen — cooking and food stores.
roof_kitchen:
  fill_threshold: 0.33
  required: [roof_tandoor]
  optional:
    - roof_brazier
    - roof_chimney
    - roof_woodpile
    - roof_water_trough
    - barrel
    - crate
    - roof_jars
    - roof_amphora
    - roof_lamp
    - table
    - roof_shade
    - sack_pile

