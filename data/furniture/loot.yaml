# Loot tables for container furniture. Referenced by `loot:` on a
# FurnitureBlock. Two strategies:
#   - items + count (+ capacity): roll N weighted stacks into distinct
#     random slot indices. Default capacity=27 (chest, barrel).
#   - fixed: assign specific slot indices with independent probabilities.
#     Used for furnaces (slot 0 input, 1 fuel, 2 output) and smokers.
#
# `count`: [min, max] stacks (inclusive).
# `weight`: relative probability in the pool (defaults to 1).
# `count` on an item: [min, max] stack size (inclusive).
# `chance` on a fixed slot: 0..=1 probability of populating at all.

# Generic small-chest/barrel contents — a bit of everything.
storage:
  count: [3, 8]
  items:
    - { id: "minecraft:stick",        count: [2, 16], weight: 4 }
    - { id: "minecraft:string",       count: [1, 8],  weight: 3 }
    - { id: "minecraft:leather",      count: [1, 4],  weight: 2 }
    - { id: "minecraft:iron_ingot",   count: [1, 4],  weight: 2 }
    - { id: "minecraft:flint",        count: [1, 6],  weight: 2 }
    - { id: "minecraft:gunpowder",    count: [1, 2],  weight: 1 }
    - { id: "minecraft:bone",         count: [1, 4],  weight: 2 }
    - { id: "minecraft:coal",         count: [1, 8],  weight: 3 }
    - { id: "minecraft:clay_ball",    count: [1, 6],  weight: 2 }
    - { id: "minecraft:brick",        count: [1, 6],  weight: 1 }
    - { id: "minecraft:paper",        count: [1, 6],  weight: 2 }
    - { id: "minecraft:torch",        count: [1, 8],  weight: 3 }

# Kitchen barrels/chests — food and cooking ingredients.
kitchen:
  count: [3, 7]
  items:
    - { id: "minecraft:bread",        count: [1, 6],  weight: 5 }
    - { id: "minecraft:wheat",        count: [1, 16], weight: 5 }
    - { id: "minecraft:carrot",       count: [1, 8],  weight: 4 }
    - { id: "minecraft:potato",       count: [1, 8],  weight: 4 }
    - { id: "minecraft:beetroot",     count: [1, 6],  weight: 3 }
    - { id: "minecraft:apple",        count: [1, 4],  weight: 3 }
    - { id: "minecraft:sweet_berries", count: [1, 6], weight: 2 }
    - { id: "minecraft:egg",          count: [1, 6],  weight: 2 }
    - { id: "minecraft:sugar",        count: [1, 4],  weight: 1 }
    - { id: "minecraft:milk_bucket",  count: [1, 1],  weight: 1 }
    - { id: "minecraft:honey_bottle", count: [1, 2],  weight: 1 }
    - { id: "minecraft:cookie",       count: [1, 4],  weight: 1 }

# Pantry — heavier on preserved foods and bulk staples.
pantry:
  count: [4, 9]
  items:
    - { id: "minecraft:wheat",        count: [4, 32], weight: 6 }
    - { id: "minecraft:bread",        count: [2, 6],  weight: 4 }
    - { id: "minecraft:carrot",       count: [2, 16], weight: 4 }
    - { id: "minecraft:potato",       count: [2, 16], weight: 4 }
    - { id: "minecraft:beetroot",     count: [2, 16], weight: 3 }
    - { id: "minecraft:dried_kelp",   count: [2, 16], weight: 2 }
    - { id: "minecraft:pumpkin_pie",  count: [1, 3],  weight: 2 }
    - { id: "minecraft:cooked_beef",  count: [1, 4],  weight: 2 }
    - { id: "minecraft:cooked_porkchop", count: [1, 4], weight: 2 }
    - { id: "minecraft:cooked_chicken", count: [1, 4], weight: 2 }
    - { id: "minecraft:cooked_cod",   count: [1, 4],  weight: 1 }
    - { id: "minecraft:apple",        count: [1, 6],  weight: 2 }

# Bedroom — personal effects, clothing-adjacent, keepsakes.
bedroom:
