barrel:
  blocks:
    - block: "minecraft:barrel[facing=up]"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
      facing: away_from_wall
    - offset: [0, 1]
      constraint: blocked_reachable

single_bed:
  unique: true
  tags: [bed]
  # Single beds disappear from very large rooms — they'd look dwarfed there.
  max_room_area: 49
  blocks:
    # Only the foot is placed explicitly — BedBlock.setPlacedBy runs on
    # block update and creates the head at foot + facing. With facing set
    # to toward_wall (via the [0,0] constraint), the head lands on slot.cell,
    # which the wall constraint already claims.
    - block: "minecraft:red_bed[part=foot]"
      offset: [0, 0, 1]
      layer: ground
      swap: color
  constraints:
    - offset: [0, 0]
      constraint: wall
      facing: toward_wall
    - offset: [0, 1]
      constraint: blocked_reachable

double_bed:
  unique: true
  tags: [bed]
  min_room_area: 25
  blocks:
    # Two red beds side-by-side against the same wall. Each foot spawns its
    # head via setPlacedBy at foot + facing (toward_wall), just like single_bed.
    - block: "minecraft:red_bed[part=foot]"
      offset: [0, 0, 1]
      layer: ground
      swap: color
    - block: "minecraft:red_bed[part=foot]"
      offset: [1, 0, 1]
      layer: ground
      swap: color
  constraints:
    - offset: [0, 0]
      constraint: wall
      facing: toward_wall
    - offset: [1, 0]
      constraint: wall
      facing: toward_wall
    - offset: [0, 1]
      constraint: blocked_reachable
    - offset: [1, 1]
      constraint: blocked_reachable

canopy_bed:
  unique: true
  tags: [bed]
  # 4×4 footprint with four fence-post corners and a wool canopy at y=2.
  # Only makes sense in large rooms — a smaller room would be dominated.
  min_room_area: 50
  blocks:
    # Two beds side-by-side in the middle. Foot + head placed explicitly
    # (freestanding, no wall to anchor the setPlacedBy trick) with literal
    # facings that rotate_block will carry through each 4-way rotation.
    - block: "minecraft:red_bed[part=foot,facing=north]"
      offset: [1, 0, 2]
      layer: ground
      swap: color
    - block: "minecraft:red_bed[part=head,facing=north]"
      offset: [1, 0, 1]
      layer: ground
      swap: color
    - block: "minecraft:red_bed[part=foot,facing=north]"
      offset: [2, 0, 2]
      layer: ground
      swap: color
    - block: "minecraft:red_bed[part=head,facing=north]"
      offset: [2, 0, 1]
      layer: ground
      swap: color
    # Four corner posts, 2 blocks tall.
    - block: "minecraft:oak_fence"
      offset: [0, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [0, 1, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [3, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [3, 1, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [0, 0, 3]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [0, 1, 3]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [3, 0, 3]
      layer: ground
      swap: wood
    - block: "minecraft:oak_fence"
      offset: [3, 1, 3]
      layer: ground
      swap: wood
    # Wool canopy at y=2 across the full 4×4. Layer: ceiling so the cells
    # mark as ceiling-occupied (keeps a hanging lantern from colliding) and
    # so the wool doesn't register as a floor-cell blocker.
    - block: "minecraft:red_wool"
      offset: [0, 2, 0]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [1, 2, 0]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [2, 2, 0]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [3, 2, 0]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [0, 2, 1]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [1, 2, 1]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [2, 2, 1]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [3, 2, 1]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [0, 2, 2]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [1, 2, 2]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [2, 2, 2]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [3, 2, 2]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [0, 2, 3]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [1, 2, 3]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [2, 2, 3]
      layer: ceiling
      swap: color
    - block: "minecraft:red_wool"
      offset: [3, 2, 3]
      layer: ceiling
      swap: color

bookshelf:
  blocks:
    - block: "minecraft:bookshelf"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall

chest:
  blocks:
    - block: "minecraft:chest"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
      facing: away_from_wall
    - offset: [0, 1]
      constraint: blocked_reachable

crafting_table:
  unique: true
  blocks:
    - block: "minecraft:crafting_table"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable

# Two stairs facing into each other with items on top
table:
  unique: true
  blocks:
    - block: "minecraft:oak_stairs[half=top,facing=east]"
      offset: [0, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_stairs[half=top,facing=west]"
      offset: [1, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_pressure_plate"
      offset: [0, 1, 0]
      layer: ceiling
      swap: wood
    - block: "minecraft:potted_poppy"
      offset: [1, 1, 0]
      layer: ceiling
  constraints:
    - offset: [0, 1]
      constraint: blocked_reachable
    - offset: [1, 1]
      constraint: blocked_reachable

# Stair as chair with wall_sign armrests on either side. Each sign attaches
# to the seat (the block opposite its facing direction), giving small
# perpendicular plank panels jutting out from the seat sides.
chair:
  blocks:
    - block: "minecraft:oak_stairs[half=bottom,facing=north]"
      offset: [0, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_wall_sign[facing=east]"
      offset: [1, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_wall_sign[facing=west]"
      offset: [-1, 0, 0]
      layer: ground
      swap: wood
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
      facing: toward_wall

# Desk against a wall: stair top + trapdoor front + candle on top
desk:
  unique: true
  blocks:
    - block: "minecraft:oak_stairs[half=top,facing=north]"
      offset: [0, 0, 0]
      layer: ground
      swap: wood
    - block: "minecraft:oak_trapdoor[half=bottom,open=true,facing=south]"
      offset: [0, 0, 0]
      layer: ceiling
      swap: wood
    - block: "minecraft:candle[lit=true]"
      offset: [0, 1, 0]
      layer: ceiling
  constraints:
    - offset: [0, 0]
      constraint: wall
      facing: away_from_wall
    - offset: [0, 1]
      constraint: blocked_reachable

# Chiseled bookshelf against wall
shelf:
  blocks:
    - block: "minecraft:chiseled_bookshelf"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall

# Decorated pot against a wall
vase:
  blocks:
    - block: "minecraft:decorated_pot"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall

# Hanging lantern
lantern:
  unique: true
  blocks:
    - block: "minecraft:lantern[hanging=true]"
      offset: [0, 0, 0]
      layer: ceiling

# Wall-mounted banner at floor_y+1 (eye level). Literal facing=south is correct
# for the north-wall convention; rotate_block transforms it for the other walls.
# layer: both reserves the cell's ceiling slot (no lantern collides above).
wall_banner:
  blocks:
    - block: "minecraft:white_wall_banner[facing=south]"
      offset: [0, 1, 0]
      layer: both
      swap: color
  constraints:
    - offset: [0, 0]
      constraint: wall
