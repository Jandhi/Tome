# Large bulk-storage furniture. Most are 2 blocks tall, stacked via y-offset
# on ground-layer blocks — the column's upper block sits at floor_y+1, well
# below the wall_height=3 ceiling.

# Stacked hay bales (freestanding 1x1, 2 tall). Acts as a simple cargo crate.
crate:
  blocks:
    - block: "minecraft:hay_block"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:hay_block"
      offset: [0, 1, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable

# Two barrels stacked on top of each other (freestanding 1x1, 2 tall).
# Reserves a front cell so the lower barrel stays openable.
barrel_stack:
  blocks:
    - block: "minecraft:barrel[facing=up]"
      offset: [0, 0, 0]
      layer: ground
      loot: pantry
    - block: "minecraft:barrel[facing=up]"
      offset: [0, 1, 0]
      layer: ground
      loot: pantry
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
    - offset: [0, 1]
      constraint: blocked_reachable

# 2x1 pile of hay bales with a third bale on top of the first cell.
hay_pile:
  blocks:
    - block: "minecraft:hay_block"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:hay_block"
      offset: [1, 0, 0]
      layer: ground
    - block: "minecraft:hay_block"
      offset: [0, 1, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
    - offset: [1, 0]
      constraint: blocked_reachable

# Chest sitting on top of a hay bale. Reads as a packed-up chest on a pallet.
# Reserves a front cell so the chest stays reachable.
elevated_chest:
  blocks:
    - block: "minecraft:hay_block"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:chest"
      offset: [0, 1, 0]
      layer: ground
      loot: storage
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
    - offset: [0, 1]
      constraint: blocked_reachable

# Two bookshelves stacked against a wall (1x1, 2 tall).
# Reserves a front cell so the stack has breathing room into the room.
stacked_bookshelves:
  blocks:
    - block: "minecraft:bookshelf"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:bookshelf"
      offset: [0, 1, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall
    - offset: [0, 1]
      constraint: blocked_reachable

# 2x1 stretch of bookshelves stacked 2 tall (4 blocks, against a wall).
# Reserves both front cells so a 2-wide corridor stays open in front.
loaded_shelves:
  blocks:
    - block: "minecraft:bookshelf"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:bookshelf"
      offset: [1, 0, 0]
      layer: ground
    - block: "minecraft:bookshelf"
      offset: [0, 1, 0]
      layer: ground
    - block: "minecraft:bookshelf"
      offset: [1, 1, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall
    - offset: [1, 0]
      constraint: wall
    - offset: [0, 1]
      constraint: blocked_reachable
    - offset: [1, 1]
      constraint: blocked_reachable

# White wool block with a decorated pot on top — reads as sacks with a jar.
sack_pile:
  blocks:
    - block: "minecraft:white_wool"
      offset: [0, 0, 0]
      layer: ground
    - block: "minecraft:decorated_pot"
      offset: [0, 1, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
