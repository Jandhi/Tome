# Common furniture items referenced from rooms.yaml but not yet defined
# elsewhere. Minimal stubs — each places a single block with sensible
# constraints. Flesh out with multi-block variants as needed.

chest:
  blocks:
    - block: "minecraft:chest"
      offset: [0, 0, 0]
      layer: ground
      loot: storage
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
      facing: away_from_wall

lantern:
  unique: true
  blocks:
    - block: "minecraft:lantern[hanging=true]"
      offset: [0, 0, 0]
      layer: ceiling

bookshelf:
  blocks:
    - block: "minecraft:bookshelf"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: wall

# ---------------------------------------------------------------------------
# Carpets — walkable floor decor. All tagged `carpet`; rooms list `carpet`
# twice in `optional` to cap placement at 2 per room. Multi-cell carpets
# have no constraints (freestanding tries 4 rotations at every open cell;
# walkable cells preserve connectivity).
#
# Color convention: literal `white_carpet` is recolored at placement time
# by `PaletteSwap`. `swap: color` → palette primary (body); `swap: secondary_color`
# → palette secondary (accent), falling back to primary if no secondary set.
# Patterns degrade gracefully to solid color in palettes without a secondary.
# ---------------------------------------------------------------------------

# 1×1 / 1×2: no patterns — too small to be meaningful.

carpet_1x1:
  tags: [carpet]
  weight: 1
  blocks:
    - { block: "minecraft:white_carpet", offset: [0, 0, 0], layer: ground, swap: color, walkable: true }

carpet_1x2:
  tags: [carpet]
  weight: 2
  blocks:
    - { block: "minecraft:white_carpet", offset: [0, 0, 0], layer: ground, swap: color, walkable: true }
    - { block: "minecraft:white_carpet", offset: [0, 0, 1], layer: ground, swap: color, walkable: true }

# 2×2: only checker variant.
# A B
# B A
