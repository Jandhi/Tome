anvil:
  unique: true
  blocks:
    - block: "minecraft:anvil"
      offset: [0, 0, 0]
      layer: ground
  constraints:
    - offset: [0, 0]
      constraint: blocked_reachable
      facing: perpendicular
  # A smith working the anvil.
  anchors:
    - dialogue: crafting
      slots: [ { offset: [0, 1] } ]

